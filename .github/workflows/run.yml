name: NSE Delivery Automation Clock
on:
  schedule:
    - cron: '30 14 * * 1-5' # 8:00 PM IST
  workflow_dispatch: # Manual test button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly grants the script permission to add files
    steps:
      - name: Open Repository
        uses: actions/checkout@v3

      - name: Start Python Engine
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Load Data Libraries
        run: pip install pandas requests

      - name: Execute Sync
        run: python sync.py

      - name: Save JSON Database Back To Folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Passes the dynamic key
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if the file was created before trying to add it
          if [ -f delivery_database.csv ]; then
            git add delivery_database.csv
            git commit -m "Automated database update" && git push || echo "No changes to push"
          else
            echo "Error: delivery_database.json was not created by the python script."
            exit 1
          fi
